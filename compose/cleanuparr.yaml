services:
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    environment:
      - TZ=Europe/Rome
      - PUID=1000
      - PGID=1000
    volumes:
      - ../configs/cleanuparr:/config
    ports:
      - 11011:11011
    restart: unless-stopped

networks:
  media-server-network:
    external: true