services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - TZ=Europe/Rome
      - PUID=1000
      - PGID=1000
    volumes:
      - ../configs/bazarr:/config
      - ../media/library:/media/library
    ports:
      - 6767:6767
    restart: unless-stopped

networks:
  media-server-network:
    external: true