services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=Europe/Rome
      - PUID=1000
      - PGID=1000
    volumes:
      - ../configs/radarr:/config
      - ../media:/media
    ports:
      - 7878:7878
    restart: unless-stopped

networks:
  media-server-network:
    external: true