services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - TZ=Europe/Rome
      - PUID=1000
      - PGID=1000
    volumes:
      - ../configs/jellyfin:/config
      - ../media/library:/media
    ports:
      - 8096:8096 # web interface
      - 8920:8920 # secure interface
    restart: unless-stopped

networks:
  media-server-network:
    external: true