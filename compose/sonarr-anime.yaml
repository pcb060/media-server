services:
  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-anime
    environment:
      - TZ=Europe/Rome
      - PUID=1000
      - PGID=1000
    volumes:
      - ../configs/sonarr-anime:/config
      - ../media:/media
    ports:
      - 8989:8989
    restart: unless-stopped

networks:
  media-server-network:
    external: true