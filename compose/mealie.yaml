services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.14.0
    container_name: mealie
    environment:
      - TZ=Europe/Rome
      - PUID=1000
      - PGID=1000
      - ALLOW_SIGNUP=false
      - BASE_URL=https://cook.home.pcb060.dev
    volumes:
      - ../configs/mealie:/app/data/
    ports:
      - 9000:9000
    deploy:
      resources:
        limits:
          memory: 750M
    restart: unless-stopped

networks:
  media-server-network:
    external: true